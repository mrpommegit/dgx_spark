model_list:
  - model_name: local-vllm
    litellm_params:
      model: openai/local-vllm
      api_base: http://vllm-runtime:8000/v1
      api_key: EMPTY
  - model_name: aeon-ultimate
    litellm_params:
      model: openai/aeon-ultimate
      api_base: http://aeon-vllm:8000/v1
      api_key: EMPTY
  - model_name: qwen36-ultimate
    litellm_params:
      model: openai/qwen36-ultimate
      api_base: http://aeon-vllm:8000/v1
      api_key: EMPTY
  - model_name: aeon-fast
    litellm_params:
      model: openai/aeon-fast
      api_base: http://aeon-vllm:8000/v1
      api_key: EMPTY
  - model_name: aeon-deep
    litellm_params:
      model: openai/aeon-deep
      api_base: http://aeon-vllm:8000/v1
      api_key: EMPTY
  - model_name: deepseek-spark
    litellm_params:
      model: openai/DeepSeek-V4-Flash-Spark-Mini
      api_base: http://deepseek-spark-mini-vllm:8000/v1
      api_key: EMPTY
  - model_name: local-llamacpp
    litellm_params:
      model: openai/local-llamacpp
      api_base: http://llamacpp-runtime:8080/v1
      api_key: EMPTY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  drop_params: true
  request_timeout: 600
  require_auth_for_metrics_endpoint: false

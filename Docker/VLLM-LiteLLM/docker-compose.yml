services:
  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LITELLM_POSTGRES_DB:-litellm}
      POSTGRES_USER: ${LITELLM_POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:-change-me-db-password}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - llmnet

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-change-me}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-change-me-salt}
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-change-me}
      DATABASE_URL: postgresql://${LITELLM_POSTGRES_USER:-litellm}:${LITELLM_POSTGRES_PASSWORD:-change-me-db-password}@litellm-db:5432/${LITELLM_POSTGRES_DB:-litellm}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-local}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-local}
    depends_on:
      litellm-db:
        condition: service_healthy
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    labels:
      portal.enable: "true"
      portal.name: "LiteLLM API"
      portal.description: "OpenAI-compatible proxy for local model runtimes"
      portal.port: "${LITELLM_PORT:-4000}"
      portal.icon: "api"
      portal.order: "30"
    networks:
      - llmnet

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_BASE_URLS: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-change-me}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-webui-secret}
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    labels:
      portal.enable: "true"
      portal.name: "Open WebUI"
      portal.description: "Chat interface for local models through LiteLLM"
      portal.port: "${OPEN_WEBUI_PORT:-3000}"
      portal.icon: "chat"
      portal.order: "20"
    depends_on:
      - litellm
    networks:
      - llmnet

  aeon-vllm:
    image: ${AEON_VLLM_IMAGE:-ghcr.io/aeon-7/aeon-vllm-ultimate:latest}
    container_name: aeon-vllm
    restart: unless-stopped
    entrypoint: ["vllm"]
    command:
      - serve
      - /models/aeon-ultimate
      - --served-model-name
      - aeon-ultimate
      - qwen36-ultimate
      - aeon-fast
      - aeon-deep
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --quantization
      - compressed-tensors
      - --mamba-cache-dtype
      - float32
      - --max-model-len
      - "${AEON_MAX_MODEL_LEN:-256000}"
      - --max-num-seqs
      - "${AEON_MAX_NUM_SEQS:-64}"
      - --max-num-batched-tokens
      - "${AEON_MAX_NUM_BATCHED_TOKENS:-16384}"
      - --gpu-memory-utilization
      - "${AEON_GPU_MEMORY_UTILIZATION:-0.75}"
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - safetensors
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser
      - qwen3
      - --attention-backend
      - flash_attn
      - --limit-mm-per-prompt
      - "{\"image\":4,\"video\":2}"
      - --mm-encoder-tp-mode
      - data
      - --mm-processor-cache-type
      - shm
      - --speculative-config
      - "{\"method\":\"dflash\",\"model\":\"/models/dflash-drafter\",\"num_speculative_tokens\":10}"
    environment:
      TORCH_CUDA_ARCH_LIST: 12.1a
      ENABLE_NVFP4_SM100: "0"
      VLLM_USE_FLASHINFER_MOE_FP4: "0"
      VLLM_USE_FLASHINFER_SAMPLER: "1"
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      HF_HOME: /models/hf-cache
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-${HUGGINGFACE_TOKEN:-}}
    volumes:
      - ${AEON_MODEL_DIR}:/models/aeon-ultimate:ro
      - ${AEON_DFLASH_DIR}:/models/dflash-drafter:ro
      - ${LLM_DIR}:/models/hf-cache:rw
    ports:
      - "${AEON_VLLM_PORT:-8002}:8000"
    labels:
      portal.enable: "true"
      portal.name: "AEON vLLM"
      portal.description: "Qwen3.6 27B AEON Ultimate NVFP4 with DFlash"
      portal.port: "${AEON_VLLM_PORT:-8002}"
      portal.icon: "brain"
      portal.order: "25"
    gpus: all
    ipc: host
    shm_size: "2g"
    networks:
      - llmnet

  manager:
    build:
      context: ./manager
    container_name: vllm-manager
    restart: unless-stopped
    environment:
      LLM_DIR: ${LLM_DIR}
      VLLM_IMAGE: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.70}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-8192}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS:-16}
      VLLM_DTYPE: ${VLLM_DTYPE:-auto}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      VLLM_QUANTIZATION: ${VLLM_QUANTIZATION:-}
      VLLM_EXTRA_ARGS: ${VLLM_EXTRA_ARGS:-}
      VLLM_CONTAINER_NAME: vllm-runtime
      DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-vllm-litellm}_llmnet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${LLM_DIR}:/models:rw
    ports:
      - "${MANAGER_PORT:-8088}:8088"
    labels:
      portal.enable: "true"
      portal.name: "vLLM Manager"
      portal.description: "Start, stop, and tune the local vLLM runtime"
      portal.port: "${MANAGER_PORT:-8088}"
      portal.icon: "settings"
      portal.order: "40"
    networks:
      - llmnet

networks:
  llmnet:
    name: ${COMPOSE_PROJECT_NAME:-vllm-litellm}_llmnet

volumes:
  open-webui-data:
  litellm-db-data:
